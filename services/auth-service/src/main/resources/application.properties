# Port this service listens on (auth-service runs on 8081)
server.port=8081

# Optional artificial delay (in milliseconds) added to /auth/validate.
# Read from the AUTH_DELAY_MS environment variable; defaults to 0 (no delay).
# Useful for demonstrating latency in synchronous service-to-service calls.
auth.delay.ms=${AUTH_DELAY_MS:0}
