# Port this service listens on (info-service runs on 8080)
server.port=8080

# URL of the auth-service this service calls to validate tokens.
# Read from the AUTH_URL environment variable.
# In Docker Compose: set to "http://auth-service:8081" (Docker DNS resolves the hostname).
# Locally (without Docker): defaults to "http://localhost:8081".
auth.url=${AUTH_URL:http://localhost:8081}
