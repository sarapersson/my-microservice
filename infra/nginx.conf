# =============================================================================
# Nginx reverse proxy configuration
# =============================================================================
# Nginx acts as the single entry point (gateway) for all HTTP traffic.
# It listens on port 80 and forwards (proxies) requests to the correct
# backend service based on the URL path:
#
#   /api/*  → info-service on port 8080
#   /auth/* → auth-service on port 8081
#
# The hostnames "info-service" and "auth-service" are resolved by Docker's
# internal DNS — Docker Compose creates a shared network where each container
# can be reached by its service name.
# =============================================================================

server {
  listen 80;   # Listen for HTTP traffic on port 80

  # Forward all /api/* requests to info-service (port 8080)
  location /api/ {
    proxy_pass http://info-service:8080;
  }

  # Forward all /auth/* requests to auth-service (port 8081)
  location /auth/ {
    proxy_pass http://auth-service:8081;
  }
}
