# =============================================================================
# docker-compose.cloud.yml — CLOUD deployment (e.g. AWS EC2)
# =============================================================================
# Same architecture as docker-compose.yml, but uses pre-built images from
# Docker Hub instead of building locally. This is what you run on the server.
#
# Before using:
#   1. Push your images:
#        docker push sarapersson/auth-service:1.0
#        docker push sarapersson/info-service:1.0
#
# Usage on EC2:
#   docker compose -f docker-compose.cloud.yml pull
#   docker compose -f docker-compose.cloud.yml up -d
#   docker compose -f docker-compose.cloud.yml ps
# =============================================================================

services:

  # --- Nginx Gateway (reverse proxy) ---
  # Same as local: routes /api/* and /auth/* to the correct service
  gateway:
    image: nginx:alpine
    container_name: gateway
    pull_policy: always
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - info-service
      - auth-service

  # --- Auth Service (from Docker Hub) ---
  auth-service:
    image: sarapersson/auth-service:1.0     # Pre-built image from Docker Hub
    container_name: auth-service
    pull_policy: always
    restart: unless-stopped
    environment:
      - AUTH_DELAY_MS=2000                  # Artificial delay for auth validation (0 = no delay)
    expose:
      - "8081"

  # --- Info Service (from Docker Hub) ---
  info-service:
    image: sarapersson/info-service:1.0     # Pre-built image from Docker Hub
    container_name: info-service
    pull_policy: always
    restart: unless-stopped
    environment:
      - AUTH_URL=http://auth-service:8081   # Docker DNS resolves "auth-service" to the right container
    depends_on:
      - auth-service
    expose:
      - "8080"